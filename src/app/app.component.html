<ion-app [class.app-shell-visible]="mostrarHeaderApp">
  <ion-header *ngIf="mostrarHeaderApp" class="app-shell-header">
    <ion-toolbar>
      <ion-title>Carlitos</ion-title>

      <ion-buttons slot="end">
        <ion-button fill="clear" color="primary" (click)="abrirModalAgregarActividad()">
          <ion-icon name="add" slot="icon-only"></ion-icon>
        </ion-button>
        <app-usuario-menu></app-usuario-menu>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-router-outlet [class.with-app-shell]="mostrarHeaderApp"></ion-router-outlet>
</ion-app>
