<ng-container *ngIf="modalLista">
  <ion-header>
    <ion-toolbar>
      <ion-title>{{ isEdit ? 'Editar' : 'Nueva' }} actividad</ion-title>

      <ion-buttons slot="end">
        <ion-button (click)="closeModal()" color="medium">
          <ion-icon name="close"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <form
      *ngIf="form"
      (ngSubmit)="saveActivity()"
      class="modal-form">

      <div class="form-section" *ngIf="!isEdit">
        <label class="section-label">Tipo de actividad</label>

        <div class="type-buttons">
          <ion-button
            expand="block"
            type="button"
            aria-label="Leche"
            title="Leche"
            [color]="formType === 'toma-leche' ? 'primary' : 'medium'"
            (click)="onTypeChange('toma-leche')"
            size="small">
            <ion-icon name="water"></ion-icon>
          </ion-button>

          <ion-button
            expand="block"
            type="button"
            aria-label="Pañal"
            title="Pañal"
            [color]="formType === 'cambio-panal' ? 'primary' : 'medium'"
            (click)="onTypeChange('cambio-panal')"
            size="small">
            <ion-icon name="leaf"></ion-icon>
          </ion-button>

          <ion-button
            *ngIf="tieneMedicamentosRegistrados()"
            expand="block"
            type="button"
            aria-label="Medicamento"
            title="Medicamento"
            [color]="formType === 'medicamento' ? 'primary' : 'medium'"
            (click)="onTypeChange('medicamento')"
            size="small">
            <ion-icon name="medical"></ion-icon>
          </ion-button>

          <ion-button
            expand="block"
            type="button"
            aria-label="Sueño"
            title="Sueño"
            [color]="formType === 'sueno' ? 'primary' : 'medium'"
            (click)="onTypeChange('sueno')"
            size="small">
            <ion-icon name="moon"></ion-icon>
          </ion-button>
        </div>
      </div>

      <div class="form-section">
        <label class="section-label">Hora</label>

        <div class="time-picker">
          <ion-datetime
            presentation="time"
            [(ngModel)]="form.time"
            name="time"
            locale="es-UY"
            hour-cycle="h23">
          </ion-datetime>
        </div>
      </div>

      <ng-container *ngIf="formType === 'toma-leche'">
        <div class="form-section">
          <label class="section-label">Cantidad (oz)</label>

          <div class="quick-amounts">
            <ion-button
              *ngFor="let amount of cantidadOnzasOptions"
              class="quick-amount-button"
              type="button"
              size="small"
              [color]="form.cantidadOnzas === amount && !otraCantidadActiva ? 'primary' : 'medium'"
              (click)="selectCantidadOnzas(amount)">
              <span>{{ amount }}</span>
            </ion-button>

            <ion-button
              class="quick-amount-button otra-button"
              type="button"
              size="small"
              aria-label="Otra cantidad"
              title="Otra cantidad"
              [color]="otraCantidadActiva ? 'primary' : 'medium'"
              (click)="activarOtraCantidad()">
              <ion-icon name="add"></ion-icon>
            </ion-button>
          </div>

          <div class="custom-amount-input" *ngIf="otraCantidadActiva">
            <label class="section-label">Otra cantidad</label>
            <ion-input
              type="number"
              step="0.1"
              inputmode="decimal"
              [(ngModel)]="form.cantidadOnzas"
              name="cantidadOnzas"
              placeholder="Ingresa un número"
              class="custom-input"
              (ionFocus)="limpiarCeroInput('cantidadOnzas')"
              (ionBlur)="restaurarCeroInput('cantidadOnzas')">
            </ion-input>
          </div>
        </div>

        <div class="form-section">
          <label class="section-label">Tipo de leche</label>

          <div class="type-buttons">
            <ion-button
              expand="block"
              type="button"
              [color]="form.esLecheMaterna ? 'success' : 'medium'"
              (click)="form.esLecheMaterna = true"
              size="small">
              <ion-icon name="heart"></ion-icon>
              Materna
            </ion-button>

            <ion-button
              expand="block"
              type="button"
              [color]="!form.esLecheMaterna ? 'success' : 'medium'"
              (click)="form.esLecheMaterna = false"
              size="small">
              <ion-icon name="flask"></ion-icon>
              Fórmula
            </ion-button>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="formType === 'cambio-panal'">
        <div class="form-section">
          <label class="section-label">Tipo de cambio</label>

          <div class="type-buttons">
            <ion-button
              expand="block"
              type="button"
              [color]="!form.tieneHeces ? 'success' : 'medium'"
              (click)="form.tieneHeces = false"
              size="small">
              <ion-icon name="checkmark-circle"></ion-icon>
              Solo pipí
            </ion-button>

            <ion-button
              expand="block"
              type="button"
              [color]="form.tieneHeces ? 'warning' : 'medium'"
              (click)="form.tieneHeces = true"
              size="small">
              <ion-icon name="alert-circle"></ion-icon>
              Con popó
            </ion-button>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="formType === 'medicamento'">
        <div class="form-section">
          <label class="section-label">Medicamento</label>

          <div
            class="medicamentos-inline-list"
            *ngIf="medicamentosDisponibles.length; else sinMedicamentosRegistrados">

            <button
              type="button"
              class="medicamento-option"
              *ngFor="let medicamento of medicamentosDisponibles"
              [class.selected]="form.medicamentoId === medicamento.id"
              (click)="onMedicamentoChange(medicamento.id)">

              <div class="medicamento-option-icon">
                <ion-icon name="medical-outline" color="medicamento"></ion-icon>
              </div>

              <div class="medicamento-option-info">
                <strong>{{ medicamento.nombre }}</strong>

                <span>
                  {{ medicamento.dosisGotas }} gotas

                  <ng-container *ngIf="$any(medicamento).nombreBebe">
                    · {{ $any(medicamento).nombreBebe }}
                  </ng-container>
                </span>
              </div>

              <ion-icon
                *ngIf="form.medicamentoId === medicamento.id"
                name="checkmark-circle"
                class="selected-icon">
              </ion-icon>
            </button>
          </div>

          <ng-template #sinMedicamentosRegistrados>
            <div class="empty-state">
              <p>No hay medicamentos activos registrados.</p>
              <small>Primero agrégalos desde el detalle del bebé.</small>
            </div>
          </ng-template>
        </div>

        <div class="form-section" *ngIf="form.medicamentoId">
          <label class="section-label">Dosis en gotas</label>

          <ion-input
  type="number"
  [(ngModel)]="form.dosisGotas"
  name="dosisGotas"
  placeholder="Ej: 3"
  class="custom-input"
  (ionFocus)="limpiarCeroInput('dosisGotas')"
  (ionBlur)="restaurarCeroInput('dosisGotas')">
</ion-input>
        </div>

        <div class="form-section" *ngIf="form.medicamentoId">
          <label class="section-label">Observaciones</label>

          <ion-textarea
            [(ngModel)]="form.observaciones"
            name="observaciones"
            placeholder="Ej: Se lo tomó bien, después de la leche..."
            auto-grow="true"
            rows="3"
            class="custom-input">
          </ion-textarea>
        </div>
      </ng-container>

      <ng-container *ngIf="formType === 'sueno'">
        <div class="form-section">
          <label class="section-label">Fin del sueño</label>

          <div class="time-picker">
            <ion-datetime
              presentation="time"
              [(ngModel)]="form.fin"
              name="fin"
              locale="es-UY"
              hour-cycle="h23">
            </ion-datetime>
          </div>

          <ion-note>
            Si no seleccionas fin, quedará como sueño en curso.
          </ion-note>
        </div>

        <div class="form-section">
          <label class="section-label">Observaciones</label>

          <ion-textarea
            [(ngModel)]="form.observaciones"
            name="observacionesSueno"
            placeholder="Ej: Siesta corta, se despertó tranquilo."
            auto-grow="true"
            rows="3"
            class="custom-input">
          </ion-textarea>
        </div>
      </ng-container>

      <ion-button
        expand="block"
        type="submit"
        class="save-button">
        <ion-icon name="checkmark"></ion-icon>
        {{ isEdit ? 'Guardar cambios' : 'Agregar actividad' }}
      </ion-button>
    </form>
  </ion-content>
</ng-container>
