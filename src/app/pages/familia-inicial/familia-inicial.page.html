<div class="form-card">

  <ion-item class="familia-input" lines="none">
    <ion-label position="stacked">Código de invitación</ion-label>
    <ion-input
      [(ngModel)]="codigoInvitacion"
      placeholder="Ej: ABCD12"
      (ionInput)="normalizarCodigo()">
    </ion-input>
  </ion-item>

  <ion-text color="medium">
    <p class="ayuda-codigo">
      Ingresá el código de invitación que te compartieron para unirte a la familia.
    </p>
  </ion-text>

  <ion-button
    type="button"
    expand="block"
    class="crear-button"
    [disabled]="cargando"
    (click)="unirmeConCodigo()">

    {{ cargando ? 'Uniendo...' : 'Unirme a la familia' }}

    <ion-spinner
      *ngIf="cargando"
      name="crescent"
      class="spinner-button">
    </ion-spinner>
  </ion-button>

  <ion-text color="danger" *ngIf="error">
    <p class="error">{{ error }}</p>
  </ion-text>

</div>
