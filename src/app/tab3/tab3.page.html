  <!-- Lo que ya tenías -->
  <ion-list>
    <ion-item>
      <ion-input
        label="Tiempo entre tomas"
        label-placement="stacked"
        type="number"
        min="1"
        max="24"
        [(ngModel)]="tiempoEntreTomasHoras"
        (ionInput)="limpiarMensaje()"
        placeholder="Ej: 3">
      </ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-note>
        Indica cada cuántas horas debería tomar leche el bebé.
      </ion-note>
    </ion-item>

    <ion-item>
      <ion-input
        label="Onzas diarias objetivo"
        label-placement="stacked"
        type="number"
        min="1"
        inputmode="decimal"
        [(ngModel)]="onzasDiariasObjetivo"
        (ionInput)="limpiarMensaje()"
        placeholder="Ej: 24">
      </ion-input>

      <ion-note slot="end">oz</ion-note>
    </ion-item>
  </ion-list>

  <ion-button expand="block" class="ion-margin-top" (click)="guardarConfiguracion()">
    Guardar configuración
  </ion-button>

  <ion-text color="success" *ngIf="mensajeGuardado">
    <p class="ion-margin-top">{{ mensajeGuardado }}</p>
  </ion-text>

  <!-- Modal datos del bebé -->
  <ion-modal [isOpen]="showModalBebe" (didDismiss)="cerrarModalBebe()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Datos del bebé</ion-title>

          <ion-buttons slot="end">
            <ion-button (click)="cerrarModalBebe()" color="medium">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-list>
          <ion-item>
            <ion-input
              label="Nombre"
              label-placement="stacked"
              type="text"
              [(ngModel)]="bebeForm.nombre"
              placeholder="Ej: Sofía">
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-input
              label="Fecha de nacimiento"
              label-placement="stacked"
              type="date"
              [(ngModel)]="bebeForm.fechaNacimiento">
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-input
              label="Edad"
              label-placement="stacked"
              type="number"
              min="0"
              [(ngModel)]="bebeForm.edad"
              placeholder="Ej: 4">
            </ion-input>

            <ion-note slot="end">meses</ion-note>
          </ion-item>

          <ion-item>
            <ion-input
              label="Peso"
              label-placement="stacked"
              type="number"
              inputmode="decimal"
              min="0"
              [(ngModel)]="bebeForm.peso"
              placeholder="Ej: 6.5">
            </ion-input>

            <ion-note slot="end">kg</ion-note>
          </ion-item>

          <ion-item>
            <ion-input
              label="Altura"
              label-placement="stacked"
              type="number"
              inputmode="decimal"
              min="0"
              [(ngModel)]="bebeForm.altura"
              placeholder="Ej: 62">
            </ion-input>

            <ion-note slot="end">cm</ion-note>
          </ion-item>

          <ion-item>
            <ion-input
              label="Próxima vacuna"
              label-placement="stacked"
              type="date"
              [(ngModel)]="bebeForm.proximaVacuna">
            </ion-input>
          </ion-item>
        </ion-list>

        <ion-button
          expand="block"
          class="ion-margin-top"
          (click)="guardarDatosBebe()">
          Guardar datos del bebé
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
